name: QA Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'  # nightly full regression at 6 UTC

jobs:
  smoke:
    name: Smoke tests (PR gate)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run smoke tests
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          TEST_HARNESS_TOKEN: ${{ secrets.TEST_HARNESS_TOKEN }}
        run: npm run test:smoke
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-smoke
          path: playwright-report/
          retention-days: 14

  regression:
    name: Full regression (nightly)
    if: github.event_name == 'schedule' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps
      - name: Run regression
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          TEST_HARNESS_TOKEN: ${{ secrets.TEST_HARNESS_TOKEN }}
        run: npm run test:regression
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-regression
          path: playwright-report/
          retention-days: 30

  ai-trace-analysis:
    name: AI analysis on failure
    needs: [regression]
    if: always() && needs.regression.result == 'failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Analyze first failure with Claude
        if: env.ANTHROPIC_API_KEY != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          TRACE=$(find artifacts/ -name "error-context.md" | head -1)
          if [ -n "$TRACE" ]; then node scripts/analyze-trace.js "$TRACE"; fi
